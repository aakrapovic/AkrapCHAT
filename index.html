<div class="chat-input-wrapper" id="chat-input-wrapper">
    <!-- Выпадающее меню эмодзи -->
    <div class="emoji-picker-menu" id="emoji-menu">
      <div class="emoji-tabs" id="emoji-tabs">
        <span class="active" data-category="smileys" title="Смайлы и лица">😀</span>
        <span data-category="gestures" title="Жесты и руки">👍</span>
        <span data-category="hearts" title="Сердечки">❤️</span>
        <span data-category="animals" title="Животные и природа">🐶</span>
        <span data-category="food" title="Еда и напитки">🍕</span>
        <span data-category="activities" title="Активности и спорт">⚽</span>
        <span data-category="objects" title="Предметы">💡</span>
        <span data-category="travel" title="Путешествия и места">🚗</span>
        <span data-category="symbols" title="Символы">✨</span>
      </div>
      <div class="emoji-list-container" id="emoji-list-container">
        <div class="emoji-grid" id="emoji-grid"></div>
      </div>
    </div>

    <div class="action-bar" id="action-bar">
      <div class="action-bar-line" id="action-bar-line"></div>
      <div class="action-bar-content">
        <div class="action-bar-title" id="action-bar-title">Имя</div>
        <div class="action-bar-text" id="action-bar-text">Текст</div>
      </div>
      <div class="action-bar-close" id="cancel-action">✕</div>
    </div>

    <form class="chat-input" id="chat-form">
      <button type="button" class="input-icon-btn" id="attach-btn" title="Прикрепить файл">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
        </svg>
      </button>
      <textarea id="message-input" placeholder="Сообщение..." rows="1" required autocomplete="off" disabled></textarea>
      <button type="button" class="input-icon-btn" id="emoji-btn" title="Выбрать эмодзи">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
          <line x1="9" y1="9" x2="9.01" y2="9"></line>
          <line x1="15" y1="9" x2="15.01" y2="9"></line>
        </svg>
      </button>
      <button type="submit" title="Отправить" id="send-btn" disabled>
        <svg class="send-icon" viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </form>
  </div>
