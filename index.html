<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AkrapCHAT</title>
  <style>
    /* CSS Переменные для переключения тем */
    :root {
      --bg-color: #0e1621;
      --header-bg: #17212b;
      --input-bg: #242f3d;
      --text-color: #ffffff;
      --subtitle-color: #7f91a4;
      --my-msg-bg: #2b5278;
      --other-msg-bg: #182533;
      --meta-my: #7ea4c6;
      --meta-other: #6c7883;
      --author-color: #5887b4;
      --scroll-thumb: rgba(255, 255, 255, 0.1);
      --header-shadow: rgba(0,0,0,0.2);
      --modal-bg: #17212b;
      --modal-btn-hover: rgba(255, 255, 255, 0.08);
      --danger-color: #e53935;
    }

    [data-theme="light"] {
      --bg-color: #e6ebf0;
      --header-bg: #ffffff;
      --input-bg: #f1f3f4;
      --text-color: #000000;
      --subtitle-color: #707579;
      --my-msg-bg: #e3ffc4;
      --other-msg-bg: #ffffff;
      --meta-my: #5da063;
      --meta-other: #a1aab3;
      --author-color: #3390ec;
      --scroll-thumb: rgba(0, 0, 0, 0.15);
      --header-shadow: rgba(0,0,0,0.05);
      --modal-bg: #ffffff;
      --modal-btn-hover: rgba(0, 0, 0, 0.05);
      --danger-color: #d32f2f;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    }
    
    body { 
      background: var(--bg-color);
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      transition: background 0.3s ease;
    }

    .chat-container { 
      width: 100%; 
      max-width: 450px; 
      height: 100vh; 
      background: var(--bg-color); 
      display: flex; 
      flex-direction: column; 
      overflow: hidden; 
      position: relative;
      transition: background 0.3s ease;
    }

    @media (min-width: 500px) {
      .chat-container {
        height: 90vh;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      }
    }

    /* Шапка */
    .chat-header { 
      padding: 12px 20px; 
      background: var(--header-bg); 
      color: var(--text-color);
      font-weight: 600; 
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 10;
      box-shadow: 0 1px 3px var(--header-shadow);
      transition: background 0.3s ease, color 0.3s ease;
    }
    
    .chat-header .avatar {
      width: 40px;
      height: 40px;
      background: var(--author-color);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .chat-header .title-area {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .chat-header .title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-header .subtitle {
      font-size: 13px;
      color: var(--subtitle-color);
      font-weight: normal;
      display: none;
    }

    .chat-header .subtitle.active {
      display: block;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .action-btn {
      cursor: pointer;
      font-size: 20px;
      padding: 5px;
      border-radius: 50%;
      user-select: none;
      transition: transform 0.15s ease;
    }

    .action-btn:hover {
      transform: scale(1.15);
    }

    /* Список сообщений */
    .messages-list { 
      flex: 1; 
      padding: 15px; 
      overflow-y: auto; 
      display: flex; 
      flex-direction: column; 
      gap: 8px; 
    }

    .messages-list::-webkit-scrollbar { width: 6px; }
    .messages-list::-webkit-scrollbar-thumb { background: var(--scroll-thumb); border-radius: 4px; }

    /* Облачко сообщения и анимации */
    .message { 
      max-width: 85%; 
      padding: 6px 12px; 
      border-radius: 12px; 
      font-size: 15px; 
      word-break: break-word; 
      line-height: 1.4;
      position: relative;
      display: flex;
      flex-direction: column;
      color: var(--text-color);
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      transition: background 0.3s ease, color 0.3s ease, transform 0.25s ease, opacity 0.25s ease;
      animation: messageAppear 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      user-select: none;
    }

    @keyframes messageAppear {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .message.removing {
      animation: messageRemove 0.3s ease forwards;
    }

    @keyframes messageRemove {
      to {
        opacity: 0;
        transform: scale(0.7) translateY(-20px);
        max-height: 0;
        padding-top: 0;
        padding-bottom: 0;
        margin-bottom: 0;
      }
    }

    .message.my { 
      align-self: flex-end; 
      background: var(--my-msg-bg); 
      border-bottom-right-radius: 4px; 
    }
    
    .message.other { 
      align-self: flex-start; 
      background: var(--other-msg-bg); 
      border-bottom-left-radius: 4px; 
    }

    .message.highlight {
      animation: highlightPulse 1.5s ease;
    }

    @keyframes highlightPulse {
      0% { filter: brightness(1.5); box-shadow: 0 0 15px var(--author-color); }
      100% { filter: brightness(1); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    }

    .message-author { 
      font-size: 13px; 
      color: var(--author-color); 
      font-weight: 600; 
      margin-bottom: 2px; 
    }

    .message-reply {
      background: rgba(0, 0, 0, 0.15);
      border-left: 3px solid var(--author-color);
      padding: 3px 8px;
      margin-bottom: 4px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .message.my .message-reply {
      background: rgba(0, 0, 0, 0.12);
      border-left-color: #ffffff;
    }

    .reply-author {
      font-weight: 600;
      font-size: 12px;
      color: var(--author-color);
    }
    .message.my .reply-author {
      color: #d1e7ff;
    }

    .reply-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.85;
    }

    .message-text {
      white-space: pre-wrap;
    }

    .message-meta { 
      display: flex; 
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      font-size: 11px; 
      margin-top: 2px;
    }

    .message.my .message-meta { color: var(--meta-my); }
    .message.other .message-meta { color: var(--meta-other); }

    .edited-mark {
      font-style: italic;
    }

    .status-ticks {
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
      width: 16px;
      height: 12px;
    }

    .status-ticks svg {
      width: 16px;
      height: 12px;
      fill: currentColor;
    }

    /* Блок реакций снизу сообщения */
    .message-reactions {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .reaction-badge {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.15s ease;
    }

    .reaction-badge:hover {
      transform: scale(1.08);
      background: rgba(0, 0, 0, 0.3);
    }

    .message.my .reaction-badge {
      background: rgba(0, 0, 0, 0.18);
    }

    /* Всплывающее меню выбора реакций (с плавной упругой анимацией) */
    .reaction-picker {
      position: absolute;
      bottom: 105%;
      left: 50%;
      transform: translateX(-50%) scale(0.7) translateY(12px);
      background: var(--header-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      border-radius: 30px;
      padding: 8px 14px;
      display: flex;
      gap: 10px;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s ease;
    }

    .reaction-picker.active {
      opacity: 1;
      transform: translateX(-50%) scale(1) translateY(0);
      pointer-events: auto;
    }

    .reaction-picker span {
      font-size: 24px;
      cursor: pointer;
      display: inline-block;
      transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .reaction-picker span:hover {
      transform: scale(1.4) translateY(-3px);
    }

    /* Анимация плавающего сердечка при двойном тапе */
    @keyframes popHeart {
      0% { transform: scale(0.3) translateY(0); opacity: 0; }
      50% { transform: scale(1.3) translateY(-15px); opacity: 1; }
      100% { transform: scale(1) translateY(-25px); opacity: 0; }
    }

    .floating-heart {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      pointer-events: none;
      animation: popHeart 0.6s ease forwards;
      z-index: 20;
    }

    .msg-controls {
      display: flex;
      gap: 10px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.2s ease, opacity 0.15s ease, margin-top 0.2s ease;
      margin-top: 0;
    }
    
    .message:hover .msg-controls {
      max-height: 25px;
      opacity: 1;
      margin-top: 4px;
    }

    .msg-controls span {
      cursor: pointer;
      font-size: 13px;
      transition: transform 0.1s ease;
    }
    
    .msg-controls span:hover {
      transform: scale(1.15);
    }

    .action-bar {
      display: none;
      background: var(--header-bg);
      padding: 8px 15px;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
      color: var(--text-color);
    }

    .action-bar.active {
      display: flex;
    }

    .action-bar-line {
      width: 3px;
      height: 32px;
      background: var(--author-color);
      border-radius: 2px;
    }

    .action-bar-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .action-bar-title {
      font-weight: 600;
      color: var(--author-color);
    }

    .action-bar-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.8;
    }

    .action-bar-close {
      cursor: pointer;
      font-size: 18px;
      padding: 0 5px;
      opacity: 0.6;
    }
    .action-bar-close:hover {
      opacity: 1;
    }

    /* Модальные окна */
    .modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-box {
      background: var(--modal-bg);
      width: 85%;
      max-width: 320px;
      border-radius: 14px;
      padding: 20px 20px 10px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      color: var(--text-color);
      transform: scale(0.9);
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-overlay.active .modal-box {
      transform: scale(1);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .modal-desc {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 15px;
      line-height: 1.4;
    }

    .modal-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--subtitle-color);
      background: var(--input-bg);
      color: var(--text-color);
      font-size: 15px;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.2s ease;
    }

    .modal-input:focus {
      border-color: var(--author-color);
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 5px;
    }

    .modal-btn {
      background: transparent;
      border: none;
      color: var(--author-color);
      font-weight: 600;
      font-size: 14px;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background 0.15s ease;
    }

    .modal-btn:hover {
      background: var(--modal-btn-hover);
    }

    .modal-btn.danger {
      color: var(--danger-color);
    }

    .chat-input-wrapper {
      background: var(--header-bg);
      display: flex;
      flex-direction: column;
    }

    .chat-input { 
      display: flex; 
      padding: 10px 15px; 
      gap: 10px; 
      align-items: flex-end;
    }

    .chat-input textarea { 
      flex: 1; 
      padding: 10px 15px; 
      border-radius: 20px; 
      border: none; 
      background: var(--input-bg); 
      color: var(--text-color); 
      outline: none; 
      font-size: 15px;
      resize: none;
      max-height: 120px;
      min-height: 42px;
      line-height: 1.4;
      overflow-y: auto;
      transition: background 0.3s ease, color 0.3s ease;
    }
    
    .chat-input textarea::-webkit-scrollbar {
      width: 4px;
    }
    .chat-input textarea::-webkit-scrollbar-thumb {
      background: var(--scroll-thumb);
      border-radius: 4px;
    }

    .chat-input textarea::placeholder {
      color: var(--subtitle-color);
    }

    .chat-input button { 
      width: 44px;
      height: 44px;
      border-radius: 50%; 
      border: none; 
      background: var(--author-color); 
      color: white; 
      cursor: pointer; 
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s ease;
    }

    .chat-input button:hover { 
      opacity: 0.8; 
    }
    
    .send-icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
      margin-left: 3px; 
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">💬</div>
    <div class="title-area">
      <div class="title" id="header-title">Новый чат</div>
      <div class="subtitle" id="header-subtitle">печатает...</div>
    </div>
    <div class="header-actions">
      <div class="action-btn" id="change-name-btn" title="Сменить имя">👤</div>
      <div class="action-btn" id="theme-btn" title="Сменить тему">🌞</div>
    </div>
  </div>
  
  <div class="messages-list" id="messages"></div>

  <!-- Модальное окно ввода имени -->
  <div class="modal-overlay" id="name-modal">
    <div class="modal-box">
      <div class="modal-title" id="name-modal-title">Ваше имя</div>
      <div class="modal-desc" id="name-modal-desc">Введите ваше имя для участия в чате:</div>
      <input type="text" class="modal-input" id="name-modal-input" autocomplete="off">
      <div class="modal-buttons">
        <button class="modal-btn" id="name-modal-cancel">Отмена</button>
        <button class="modal-btn" id="name-modal-confirm">Продолжить</button>
      </div>
    </div>
  </div>

  <!-- Модальное окно удаления сообщения -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal-box">
      <div class="modal-title">Удаление сообщения</div>
      <div class="modal-desc">Вы действительно хотите удалить это сообщение?</div>
      <div class="modal-buttons">
        <button class="modal-btn" id="modal-cancel">Отмена</button>
        <button class="modal-btn danger" id="modal-confirm">Удалить</button>
      </div>
    </div>
  </div>
  
  <div class="chat-input-wrapper">
    <div class="action-bar" id="action-bar">
      <div class="action-bar-line" id="action-bar-line"></div>
      <div class="action-bar-content">
        <div class="action-bar-title" id="action-bar-title">Имя</div>
        <div class="action-bar-text" id="action-bar-text">Текст</div>
      </div>
      <div class="action-bar-close" id="cancel-action">✕</div>
    </div>

    <form class="chat-input" id="chat-form">
      <textarea id="message-input" placeholder="Сообщение" rows="1" required autocomplete="off"></textarea>
      <button type="submit">
        <svg class="send-icon" viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </form>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, remove, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const themeBtn = document.getElementById('theme-btn');
  let currentTheme = localStorage.getItem('chat_theme') || 'dark';
  
  if (currentTheme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    themeBtn.textContent = '🌙';
  }

  themeBtn.addEventListener('click', () => {
    if (document.documentElement.getAttribute('data-theme') === 'light') {
      document.documentElement.removeAttribute('data-theme');
      localStorage.setItem('chat_theme', 'dark');
      themeBtn.textContent = '🌞';
    } else {
      document.documentElement.setAttribute('data-theme', 'light');
      localStorage.setItem('chat_theme', 'light');
      themeBtn.textContent = '🌙';
    }
  });

  const firebaseConfig = {
    apiKey: "AIzaSyD5L07zQ8Tpx71b-ykrh4dqasX_4ypXpyc",
    authDomain: "akrapmsg.firebaseapp.com",
    databaseURL: "https://akrapmsg-default-rtdb.firebaseio.com",
    projectId: "akrapmsg",
    storageBucket: "akrapmsg.firebasestorage.app",
    messagingSenderId: "526501884029",
    appId: "1:526501884029:web:3c26d1ba0b519eb78d0114"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'messages');
  const typingRef = ref(db, 'typing');

  const messagesDiv = document.getElementById('messages');
  const form = document.getElementById('chat-form');
  const input = document.getElementById('message-input');
  const changeNameBtn = document.getElementById('change-name-btn');
  const headerTitle = document.getElementById('header-title');
  const headerSubtitle = document.getElementById('header-subtitle');
  
  const actionBar = document.getElementById('action-bar');
  const actionBarLine = document.getElementById('action-bar-line');
  const actionBarTitle = document.getElementById('action-bar-title');
  const actionBarText = document.getElementById('action-bar-text');
  const cancelActionBtn = document.getElementById('cancel-action');

  const nameModal = document.getElementById('name-modal');
  const nameModalTitle = document.getElementById('name-modal-title');
  const nameModalDesc = document.getElementById('name-modal-desc');
  const nameModalInput = document.getElementById('name-modal-input');
  const nameModalCancel = document.getElementById('name-modal-cancel');
  const nameModalConfirm = document.getElementById('name-modal-confirm');
  let isNameChangeMode = false;

  const deleteModal = document.getElementById('delete-modal');
  const modalCancelBtn = document.getElementById('modal-cancel');
  const modalConfirmBtn = document.getElementById('modal-confirm');
  let messageToDeleteId = null;

  let activeReplyData = null;
  let activeEditData = null;

  let userId = 'usr_' + Math.random().toString(36).substring(2, 7) + '_' + Date.now();
  let username = localStorage.getItem('chat_username');

  function autoResizeTextarea() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  }

  input.addEventListener('input', autoResizeTextarea);

  // Обработка клавиатуры (Отправка по Enter и шорткод Ctrl + Стрелка вверх для ответа)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
      return;
    }

    // Шорткод Ctrl + Стрелка вверх для ответа на последнее сообщение (как в Telegram)
    if (e.key === 'ArrowUp' && (e.ctrlKey || e.metaKey)) {
      if (input.selectionStart === 0 && input.selectionEnd === 0) {
        e.preventDefault();
        
        const messageElements = messagesDiv.querySelectorAll('.message');
        if (messageElements.length > 0) {
          const lastMsgEl = messageElements[messageElements.length - 1];
          const lastMsgId = lastMsgEl.id.replace('msg-', '');
          
          const textEl = lastMsgEl.querySelector('.message-text');
          const authorEl = lastMsgEl.querySelector('.message-author');
          
          let authorName = username;
          if (authorEl) {
            authorName = authorEl.textContent;
          }
          
          if (textEl) {
            const msgText = textEl.textContent;
            window.replyMessage(lastMsgId, authorName, encodeURIComponent(msgText));
          }
        }
      }
    }
  });

  function openNameModal(isChange = false) {
    isNameChangeMode = isChange;
    nameModalTitle.textContent = isChange ? 'Изменение имени' : 'Ваше имя';
    nameModalDesc.textContent = isChange ? 'Введите новое имя:' : 'Введите ваше имя для участия в чате:';
    nameModalInput.value = username || '';
    nameModalCancel.style.display = isChange ? 'block' : 'none';
    nameModal.classList.add('active');
    setTimeout(() => nameModalInput.focus(), 100);
  }

  function closeNameModal() {
    nameModal.classList.remove('active');
  }

  nameModalConfirm.addEventListener('click', () => {
    let enteredName = nameModalInput.value.trim();
    if (!enteredName) return;

    username = enteredName;
    localStorage.setItem('chat_username', username);
    closeNameModal();

    if (isNameChangeMode) {
      location.reload();
    }
  });

  nameModalInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      nameModalConfirm.click();
    }
  });

  nameModalCancel.addEventListener('click', () => {
    closeNameModal();
  });

  if (!username) {
    openNameModal(false);
  }

  changeNameBtn.addEventListener('click', () => {
    openNameModal(true);
  });

  const myTypingRef = ref(db, 'typing/' + userId);
  let typingTimeout = null;
  let isCurrentlyTyping = false;

  input.addEventListener('input', () => {
    const text = input.value.trim();
    if (text.length > 0) {
      if (!isCurrentlyTyping) {
        isCurrentlyTyping = true;
        set(myTypingRef, { name: username, isTyping: true });
        onDisconnect(myTypingRef).remove();
      }
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        isCurrentlyTyping = false;
        remove(myTypingRef);
      }, 3000);
    } else {
      isCurrentlyTyping = false;
      remove(myTypingRef);
      clearTimeout(typingTimeout);
    }
  });

  form.addEventListener('submit', () => {
    isCurrentlyTyping = false;
    remove(myTypingRef);
    clearTimeout(typingTimeout);
  });

  onValue(typingRef, (snapshot) => {
    const data = snapshot.val() || {};
    let activeTypingNames = [];

    for (let id in data) {
      if (id !== userId && data[id].isTyping) {
        activeTypingNames.push(data[id].name);
      }
    }

    if (activeTypingNames.length > 0) {
      headerTitle.style.display = 'none';
      headerSubtitle.classList.add('active');
      if (activeTypingNames.length === 1) {
        headerSubtitle.textContent = `${activeTypingNames[0]} печатает...`;
      } else {
        headerSubtitle.textContent = `несколько человек печатают...`;
      }
    } else {
      headerSubtitle.classList.remove('active');
      headerTitle.style.display = 'block';
    }
  });

  window.copyMessage = function(element, text) {
    const decodedText = decodeURIComponent(text);
    navigator.clipboard.writeText(decodedText).then(() => {
      const originalHTML = element.innerHTML;
      element.innerHTML = '✔️';
      setTimeout(() => { element.innerHTML = originalHTML; }, 1200);
    });
  };

  window.replyMessage = function(id, author, text) {
    cancelActiveMode();
    const decodedText = decodeURIComponent(text);
    activeReplyData = { id, author, text: decodedText };
    
    actionBarLine.style.background = 'var(--author-color)';
    actionBarTitle.textContent = author;
    actionBarText.textContent = decodedText;
    actionBar.classList.add('active');
    input.value = '';
    autoResizeTextarea();
    input.focus();
  };

  window.editMessage = function(id, oldText) {
    cancelActiveMode();
    const decodedText = decodeURIComponent(oldText);
    activeEditData = id;
    
    actionBarLine.style.background = '#e5a93b';
    actionBarTitle.textContent = 'Редактирование сообщения';
    actionBarText.textContent = decodedText;
    actionBar.classList.add('active');
    
    input.value = decodedText;
    autoResizeTextarea();
    input.focus();
  };

  function cancelActiveMode() {
    activeReplyData = null;
    activeEditData = null;
    actionBar.classList.remove('active');
  }

  cancelActionBtn.addEventListener('click', () => {
    cancelActiveMode();
    input.value = '';
    autoResizeTextarea();
  });

  window.scrollToMessage = function(targetId) {
    const targetEl = document.getElementById(`msg-${targetId}`);
    if (targetEl) {
      targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      targetEl.classList.add('highlight');
      setTimeout(() => targetEl.classList.remove('highlight'), 1500);
    }
  };

  window.deleteMessage = function(id) {
    messageToDeleteId = id;
    deleteModal.classList.add('active');
  };

  modalCancelBtn.addEventListener('click', () => {
    deleteModal.classList.remove('active');
    messageToDeleteId = null;
  });

  deleteModal.addEventListener('click', (e) => {
    if (e.target === deleteModal) {
      deleteModal.classList.remove('active');
      messageToDeleteId = null;
    }
  });

  modalConfirmBtn.addEventListener('click', () => {
    if (messageToDeleteId) {
      const msgEl = document.getElementById(`msg-${messageToDeleteId}`);
      if (msgEl) msgEl.classList.add('removing');
      setTimeout(() => {
        remove(ref(db, 'messages/' + messageToDeleteId));
      }, 280);
    }
    deleteModal.classList.remove('active');
    messageToDeleteId = null;
  });

  function closeAllPickers() {
    document.querySelectorAll('.reaction-picker').forEach(p => p.classList.remove('active'));
  }

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.message') && !e.target.closest('.reaction-picker')) {
      closeAllPickers();
    }
  });

  window.openReactionPicker = function(id, e) {
    e.preventDefault();
    closeAllPickers();

    const msgEl = document.getElementById(`msg-${id}`);
    let picker = msgEl.querySelector('.reaction-picker');
    
    if (!picker) {
      picker = document.createElement('div');
      picker.className = 'reaction-picker';
      const emojis = ['👍', '❤️', '🔥', '😂', '😮', '😢'];
      emojis.forEach(emoji => {
        const span = document.createElement('span');
        span.textContent = emoji;
        span.onclick = () => window.toggleReaction(id, emoji);
        picker.appendChild(span);
      });
      msgEl.appendChild(picker);
    }

    picker.classList.add('active');
  };

  window.toggleReaction = function(id, emoji) {
    const currentMsgRef = ref(db, `messages/${id}`);
    import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js").then(({ get }) => {
      get(currentMsgRef).then((snapshot) => {
        if (snapshot.exists()) {
          const data = snapshot.val();
          let reactions = data.reactions || {};
          let emojiUsers = reactions[emoji] || {};

          if (emojiUsers[userId]) {
            delete emojiUsers[userId];
          } else {
            emojiUsers[userId] = true;
          }

          if (Object.keys(emojiUsers).length > 0) {
            reactions[emoji] = emojiUsers;
          } else {
            delete reactions[emoji];
          }

          update(ref(db, `messages/${id}`), { reactions: reactions });
          closeAllPickers();
        }
      });
    });
  };

  window.handleMessageDblClick = function(id) {
    window.toggleReaction(id, '❤️');
    const msgEl = document.getElementById(`msg-${id}`);
    if (msgEl) {
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.textContent = '❤️';
      msgEl.appendChild(heart);
      setTimeout(() => heart.remove(), 600);
    }
  };

  function buildMessageHTML(id, data) {
    const isMy = data.userId === userId;
    const timestamp = data.timestamp ? data.timestamp : Date.now();
    const timeString = new Date(timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    const editedMark = data.edited ? '<span class="edited-mark">изменено</span>' : '';
    const safeText = encodeURIComponent(data.text);

    let controls = `
      <div class="msg-controls">
        <span onclick="replyMessage('${id}', '${data.author}', '${safeText}')" title="Ответить">↩️</span>
        <span onclick="copyMessage(this, '${safeText}')" title="Копировать текст">📋</span>
    `;
    
    if (isMy) {
      controls += `
        <span onclick="editMessage('${id}', '${safeText}')" title="Редактировать">✏️</span>
        <span onclick="deleteMessage('${id}')" title="Удалить">🗑️</span>
      `;
    }
    controls += `</div>`;

    let replyHTML = '';
    if (data.replyTo) {
      replyHTML = `
        <div class="message-reply" onclick="scrollToMessage('${data.replyTo.id}')">
          <span class="reply-author">${data.replyTo.author}</span>
          <span class="reply-text">${data.replyTo.text}</span>
        </div>
      `;
    }

    let ticksIcon = '';
    if (isMy) {
      if (data.read) {
        ticksIcon = `
          <span class="status-ticks" title="Прочитано">
            <svg viewBox="0 0 16 11">
              <path d="M11.07 0.93L5.5 6.5L3.43 4.43L2 5.86L5.5 9.36L12.5 2.36L11.07 0.93ZM14.07 0.93L13.36 1.64L14.79 3.07L15.5 2.36L14.07 0.93ZM12.64 3.79L5.5 10.93L4.07 9.5L11.21 2.36L12.64 3.79Z"/>
            </svg>
          </span>
        `;
      } else {
        ticksIcon = `
          <span class="status-ticks" title="Доставлено">
            <svg viewBox="0 0 16 11">
              <path d="M5.5 9.36L2 5.86L3.43 4.43L5.5 6.5L12.5 0.93L13.93 2.36L5.5 9.36Z"/>
            </svg>
          </span>
        `;
      }
    }

    if (!isMy && !data.read) {
      update(ref(db, 'messages/' + id), { read: true });
    }

    let reactionsHTML = '';
    if (data.reactions) {
      reactionsHTML += '<div class="message-reactions">';
      for (let emoji in data.reactions) {
        const users = data.reactions[emoji];
        const count = Object.keys(users).length;
        if (count > 0) {
          reactionsHTML += `
            <div class="reaction-badge" onclick="window.toggleReaction('${id}', '${emoji}')">
              <span>${emoji}</span>
              <span>${count}</span>
            </div>
          `;
        }
      }
      reactionsHTML += '</div>';
    }

    return `
      ${!isMy ? `<div class="message-author">${data.author}</div>` : ''}
      ${replyHTML}
      <div class="message-text">${data.text}</div>
      ${reactionsHTML}
      ${controls}
      <div class="message-meta">
        ${editedMark}
        <span class="message-time">${timeString}</span>
        ${ticksIcon}
      </div>
    `;
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    if (activeEditData) {
      update(ref(db, 'messages/' + activeEditData), { text: text, edited: true });
      setTimeout(() => {
        const editedEl = document.getElementById(`msg-${activeEditData}`);
        if (editedEl) {
          editedEl.classList.add('highlight');
          setTimeout(() => editedEl.classList.remove('highlight'), 1500);
        }
      }, 100);
    } else {
      const newMessageData = { 
        author: username, 
        userId: userId,
        text: text,
        timestamp: Date.now(),
        read: false
      };

      if (activeReplyData) {
        newMessageData.replyTo = {
          id: activeReplyData.id,
          author: activeReplyData.author,
          text: activeReplyData.text
        };
      }

      push(messagesRef, newMessageData);
    }

    input.value = '';
    autoResizeTextarea();
    cancelActiveMode();
  });

  onChildAdded(messagesRef, (snapshot) => {
    const data = snapshot.val();
    const id = snapshot.key;
    
    const msgEl = document.createElement('div');
    const isMy = data.userId === userId;
    msgEl.className = `message ${isMy ? 'my' : 'other'}`;
    msgEl.id = `msg-${id}`; 
    msgEl.innerHTML = buildMessageHTML(id, data);
    
    msgEl.addEventListener('dblclick', () => handleMessageDblClick(id));
    msgEl.addEventListener('contextmenu', (e) => openReactionPicker(id, e));

    let pressTimer;
    msgEl.addEventListener('touchstart', (e) => {
      pressTimer = setTimeout(() => {
        openReactionPicker(id, e);
      }, 500);
    });
    msgEl.addEventListener('touchend', () => clearTimeout(pressTimer));
    msgEl.addEventListener('touchmove', () => clearTimeout(pressTimer));
    
    messagesDiv.appendChild(msgEl);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });

  onChildChanged(messagesRef, (snapshot) => {
    const data = snapshot.val();
    const id = snapshot.key;
    const msgEl = document.getElementById(`msg-${id}`);
    
    if (msgEl) {
      msgEl.innerHTML = buildMessageHTML(id, data);
    }
  });

  onChildRemoved(messagesRef, (snapshot) => {
    const id = snapshot.key;
    const msgEl = document.getElementById(`msg-${id}`);
    
    if (msgEl) {
      if (!msgEl.classList.contains('removing')) {
        msgEl.classList.add('removing');
        setTimeout(() => msgEl.remove(), 280);
      } else {
        msgEl.remove();
      }
    }
  });
</script>

</body>
</html>
